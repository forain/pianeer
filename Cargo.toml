[package]
name = "pianosampler"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pianosampler"
path = "src/main.rs"

[dependencies]
jack = "0.13"
midir = "0.9"
symphonia = { version = "0.5", default-features = false, features = ["flac"] }
crossbeam-channel = "0.5"

[profile.release]
opt-level = 3
