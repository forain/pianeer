name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── WASM bundle ──────────────────────────────────────────────────────────────
  # Built once; every other job downloads the dist so core's include_dir! embeds
  # the egui web UI into each binary at compile time.
  build-wasm:
    name: Build WASM bundle (trunk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache trunk binary
        id: cache-trunk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install trunk
        if: steps.cache-trunk.outputs.cache-hit != 'true'
        run: cargo install trunk --locked

      - name: Build
        run: cd web-wasm && trunk build --release

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos-x86:
    name: macOS Intel (x86_64)
    runs-on: macos-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-apple-darwin

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Build
        run: cargo build --release -p pianeer --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-macos-x86_64
          path: target/x86_64-apple-darwin/release/pianeer

  build-macos-arm:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-apple-darwin

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Build
        run: cargo build --release -p pianeer --target aarch64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-macos-aarch64
          path: target/aarch64-apple-darwin/release/pianeer

  build-macos-universal:
    name: macOS universal binary (lipo)
    runs-on: macos-latest
    needs: [build-macos-x86, build-macos-arm]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pianeer-macos-x86_64
          path: macos-x86_64/

      - uses: actions/download-artifact@v4
        with:
          name: pianeer-macos-aarch64
          path: macos-aarch64/

      - name: Merge into universal binary
        run: |
          lipo -create \
            -output pianeer-macos-universal \
            macos-x86_64/pianeer \
            macos-aarch64/pianeer
          lipo -info pianeer-macos-universal

      - name: Rename arch binaries for release
        run: |
          cp macos-x86_64/pianeer pianeer-macos-x86_64
          cp macos-aarch64/pianeer pianeer-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-macos-universal
          path: |
            pianeer-macos-universal
            pianeer-macos-x86_64
            pianeer-macos-arm64

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    needs: [build-wasm]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pianeer-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: pianeer-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Install dev headers
        run: sudo apt-get update -qq && sudo apt-get install -y libjack-jackd2-dev libasound2-dev

      - name: Build
        run: cargo build --release -p pianeer --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/pianeer ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Build
        run: cargo build --release -p pianeer --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-windows-amd64
          path: target/x86_64-pc-windows-msvc/release/pianeer.exe

  # ── Android ─────────────────────────────────────────────────────────────────
  build-android:
    name: Android arm64 APK
    runs-on: ubuntu-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Setup Android NDK r29
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: false

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.1" \
          || true   # already installed on the runner → ignore exit code

      - name: Cache cargo-apk binary
        id: cache-cargo-apk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-apk
          key: cargo-apk-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-apk
        if: steps.cache-cargo-apk.outputs.cache-hit != 'true'
        run: cargo install cargo-apk --locked

      - name: Write release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/pianeer-release.jks

      - name: Patch keystore path in Cargo.toml
        run: |
          sed -i 's|path\s*=\s*"[^"]*pianeer-release\.jks"|path = "/tmp/pianeer-release.jks"|' \
            android/Cargo.toml

      - name: Build APK (arm64)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          RUSTFLAGS: >-
            -C link-arg=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_static.a
            -C link-arg=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++abi.a
        run: cargo apk build --release -p pianeer-android --target aarch64-linux-android

      - name: Rename arm64 APK
        run: cp target/release/apk/pianeer-android.apk pianeer-android-arm64.apk

      - name: Build APK (x86_64)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          RUSTFLAGS: >-
            -C link-arg=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android/libc++_static.a
            -C link-arg=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/x86_64-linux-android/libc++abi.a
        run: cargo apk build --release -p pianeer-android --target x86_64-linux-android

      - name: Rename x86_64 APK
        run: cp target/release/apk/pianeer-android.apk pianeer-android-x86_64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-android
          path: |
            pianeer-android-arm64.apk
            pianeer-android-x86_64.apk

  # ── GitHub Release ───────────────────────────────────────────────────────────
  # Only runs on version tags; downloads all artifacts and attaches them.
  release:
    name: Publish GitHub release
    needs: [build-macos-universal, build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
