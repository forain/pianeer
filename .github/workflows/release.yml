name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ── WASM bundle ──────────────────────────────────────────────────────────────
  # Built once; every other job downloads the dist so core's include_dir! embeds
  # the egui web UI into each binary at compile time.
  build-wasm:
    name: Build WASM bundle (trunk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Build
        run: cd web-wasm && trunk build --release

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS universal (Intel + Apple Silicon)
    runs-on: macos-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin   # aarch64-apple-darwin is the runner's native target

      - uses: Swatinem/rust-cache@v2

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Build (Intel x86_64)
        run: cargo build --release -p pianeer --target x86_64-apple-darwin

      - name: Build (Apple Silicon arm64)
        run: cargo build --release -p pianeer --target aarch64-apple-darwin

      - name: Merge into universal binary
        run: |
          lipo -create \
            -output pianeer-macos-universal \
            target/x86_64-apple-darwin/release/pianeer \
            target/aarch64-apple-darwin/release/pianeer
          lipo -info pianeer-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-macos-universal
          path: pianeer-macos-universal

  # ── Linux ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    needs: [build-wasm]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pianeer-linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: pianeer-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Install dev headers
        run: sudo apt-get update -qq && sudo apt-get install -y libjack-jackd2-dev libasound2-dev

      - name: Build
        run: cargo build --release -p pianeer --target ${{ matrix.target }}

      - name: Stage artifact
        run: cp target/${{ matrix.target }}/release/pianeer ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Android ─────────────────────────────────────────────────────────────────
  build-android:
    name: Android arm64 APK
    runs-on: ubuntu-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Setup Android NDK r29
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          add-to-path: false

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.1" \
          || true   # already installed on the runner → ignore exit code

      - name: Install cargo-apk
        run: cargo install cargo-apk --locked

      - name: Write release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/pianeer-release.jks

      - name: Patch keystore path in Cargo.toml
        run: |
          sed -i 's|path\s*=\s*"[^"]*pianeer-release\.jks"|path = "/tmp/pianeer-release.jks"|' \
            android/Cargo.toml

      - name: Build APK
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Must be an env var; cargo-apk strips RUSTFLAGS from .cargo/config.toml
          RUSTFLAGS: >-
            -C link-arg=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_static.a
            -C link-arg=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++abi.a
        run: cargo apk build --release -p pianeer-android

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-android
          path: target/release/apk/pianeer-android.apk

  # ── Haiku ─────────────────────────────────────────────────────────────────
  # Cross-compiled from Linux using the official Haiku cross-compiler Docker
  # image (ghcr.io/haiku/cross-compiler:x86_64-r1beta5).  The image ships the
  # toolchain + a minimal sysroot but NOT the full OS API headers (midi2,
  # media, etc.).  We fetch those from the Haiku source tree before building.
  # Requires Rust nightly + -Z build-std because x86_64-unknown-haiku is Tier 3.
  build-haiku:
    name: Haiku x86_64
    runs-on: ubuntu-latest
    needs: [build-wasm]
    container:
      image: ghcr.io/haiku/cross-compiler:x86_64-r1beta5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- --default-toolchain nightly \
                     --component rust-src \
                     --target x86_64-unknown-haiku \
                     --no-modify-path \
                     -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-haiku

      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: web-wasm/dist/

      - name: Fetch Haiku OS API headers
        # The cross-compiler image only includes the toolchain; the application-
        # level headers (SoundPlayer.h, MidiLocalConsumer.h, etc.) are not
        # bundled.  Sparse-clone just headers/os/ from the Haiku source tree
        # and drop them into the compiler's sysroot so cc-rs can find them.
        run: |
          SYSROOT=$(x86_64-unknown-haiku-gcc -print-sysroot)
          echo "Haiku sysroot: ${SYSROOT}"
          git init /tmp/haiku-headers
          git -C /tmp/haiku-headers remote add origin https://github.com/haiku/haiku.git
          git -C /tmp/haiku-headers sparse-checkout init --cone
          git -C /tmp/haiku-headers sparse-checkout set headers/os
          git -C /tmp/haiku-headers fetch --depth=1 origin r1beta5
          git -C /tmp/haiku-headers checkout FETCH_HEAD
          mkdir -p "${SYSROOT}/system/develop/headers/os"
          cp -r /tmp/haiku-headers/headers/os/. "${SYSROOT}/system/develop/headers/os/"

      - name: Build
        env:
          CC_x86_64_unknown_haiku:  x86_64-unknown-haiku-gcc
          CXX_x86_64_unknown_haiku: x86_64-unknown-haiku-g++
          AR_x86_64_unknown_haiku:  x86_64-unknown-haiku-ar
          CARGO_TARGET_X86_64_UNKNOWN_HAIKU_LINKER: x86_64-unknown-haiku-gcc
        run: |
          cargo build --release -p pianeer \
            --target x86_64-unknown-haiku \
            -Z build-std=std,panic_abort

      - name: Stage artifact
        run: cp target/x86_64-unknown-haiku/release/pianeer pianeer-haiku-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: pianeer-haiku-amd64
          path: pianeer-haiku-amd64

  # ── GitHub Release ───────────────────────────────────────────────────────────
  # Only runs on version tags; downloads all artifacts and attaches them.
  release:
    name: Publish GitHub release
    needs: [build-macos, build-linux, build-android, build-haiku]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
